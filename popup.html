<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ScrollCut</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Unbounded:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0b; --surface:#111113; --border:#1e1e22;
    --text:#ffffff; --muted:#9a9aaa; --subtle:#28282e;
    --red:#ff3b3b; --orange:#ff6b00; --green:#00c97a; --white:#fff;
  }
  *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
  html,body { overflow:hidden; scrollbar-width:none; }
  ::-webkit-scrollbar { display:none; }

  body {
    width:320px;
    background:var(--bg);
    background-image:
      radial-gradient(ellipse at top right, rgba(255,59,59,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at bottom left, rgba(255,107,0,0.06) 0%, transparent 50%);
    color:var(--text);
    font-family:'DM Sans',sans-serif;
    font-weight:300;
    position:relative;
    overflow:hidden;
    animation:popIn 0.18s ease both;
    transform-origin:top right;
    will-change:opacity;
  }
  @keyframes popIn {
    from { opacity:0; }
    to   { opacity:1; }
  }
  .top-strip { height:3px; background:linear-gradient(90deg,var(--red),var(--orange),#ffaa00); box-shadow: 0 0 12px rgba(255,59,59,0.4); }

  /* ── PREMIUM CORNER GLOWS ── */
  body::before {
    content:'';
    position:absolute;
    top:-40px; right:-40px;
    width:160px; height:160px;
    background:radial-gradient(circle, rgba(255,59,59,0.18) 0%, transparent 70%);
    pointer-events:none;
    z-index:0;
  }
  body::after {
    content:'';
    position:absolute;
    bottom:-40px; left:-20px;
    width:140px; height:140px;
    background:radial-gradient(circle, rgba(255,107,0,0.12) 0%, transparent 70%);
    pointer-events:none;
    z-index:0;
  }

  /* ── HEADER ── */
  .header {
    padding:.9rem 1.25rem .8rem;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--border);
    position:relative; z-index:1;
    background:linear-gradient(135deg, rgba(255,59,59,0.06) 0%, transparent 60%);
  }
  .wordmark { font-family:'Unbounded',sans-serif; font-weight:900; font-size:.72rem; letter-spacing:.12em; text-transform:uppercase; color:#fff; }
  .wordmark span { color:var(--red); }
  .tog-wrap { display:flex; align-items:center; gap:.5rem; }
  .tog-state { font-family:'DM Mono',monospace; font-size:.65rem; color:#fff; font-weight:500; }
  .tog { position:relative; width:38px; height:20px; cursor:pointer; }
  .tog input { display:none; }
  .tog-track {
    width:100%; height:100%;
    background:var(--subtle); border-radius:100px;
    border:1px solid var(--border);
    transition:background .18s ease;
    display:block;
  }
  .tog input:checked + .tog-track { background:var(--red); border-color:var(--red); }
  .tog-knob {
    position:absolute; top:3px; left:3px;
    width:14px; height:14px;
    background:#888; border-radius:50%;
    transition:transform .18s cubic-bezier(0.34,1.56,0.64,1), background .18s ease;
    pointer-events:none;
    will-change:transform;
  }
  .tog input:checked ~ .tog-knob { transform:translateX(18px); background:#fff; }

  /* ── HERO ── */
  .hero { padding:1.3rem 1.25rem .95rem; text-align:center; }
  .hero-label { font-family:'DM Mono',monospace; font-size:.6rem; letter-spacing:.15em; text-transform:uppercase; color:#aaa; margin-bottom:.45rem; }
  .hero-time {
    font-family:'Unbounded',sans-serif; font-weight:900;
    font-size:3.4rem; line-height:1; letter-spacing:-.04em;
    color:#fff;
    transition:color .4s ease;
    will-change:color;
  }
  .hero-time.warn { color:var(--orange); }
  .hero-time.over { color:var(--red); animation:limitPulse 1.4s ease-in-out infinite; }
  @keyframes limitPulse {
    0%,100% { opacity:1; }
    50%     { opacity:.3; }
  }
  .hero-unit { font-family:'DM Mono',monospace; font-size:.65rem; color:#aaa; margin-top:.3rem; letter-spacing:.1em; }
  .life-lost { margin-top:.55rem; font-size:.72rem; color:#ccc; font-weight:400; line-height:1.5; min-height:1.1em; transition:color .25s ease; }
  .life-lost.bad { color:#ff8a8a; }

  /* ── LIMIT ROW ── */
  .limit-row {
    margin:0 1.25rem;
    padding:.85rem 1rem;
    background:linear-gradient(135deg,rgba(255,59,59,.07),rgba(255,107,0,.04));
    border:1px solid rgba(255,59,59,.22);
    border-radius:13px;
    display:flex; align-items:center; justify-content:space-between;
    position:relative; overflow:hidden;
  }
  .limit-row::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg,var(--red),var(--orange)); opacity:.5;
  }
  .limit-eyebrow { font-family:'DM Mono',monospace; font-size:.52rem; letter-spacing:.15em; text-transform:uppercase; color:#ff7070; margin-bottom:.15rem; }
  .limit-label { font-family:'Unbounded',sans-serif; font-size:.66rem; font-weight:700; color:#fff; }
  .limit-used { font-family:'DM Mono',monospace; font-size:.56rem; color:#bbb; margin-top:.22rem; }
  .limit-ctrl { display:flex; align-items:center; gap:.45rem; }
  .lim-btn {
    width:28px; height:28px;
    background:rgba(255,59,59,.1); border:1px solid rgba(255,59,59,.25);
    border-radius:7px; color:#ff8a8a; font-size:.95rem;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-family:inherit; line-height:1;
    transition:background .12s ease, transform .1s ease;
    will-change:transform;
  }
  .lim-btn:active { transform:scale(.93); background:rgba(255,59,59,.2); }
  .lim-val { font-family:'Unbounded',sans-serif; font-weight:900; font-size:1.25rem; color:#fff; min-width:48px; text-align:center; letter-spacing:-.03em; transition:opacity .15s; }
  .lim-val-unit { font-family:'DM Mono',monospace; font-size:.52rem; color:#aaa; text-align:center; margin-top:1px; letter-spacing:.08em; }

  /* ── PROGRESS ── */
  .progress-wrap { padding:.85rem 1.25rem .9rem; }
  .progress-track { height:3px; background:var(--subtle); border-radius:2px; overflow:hidden; }
  .progress-fill {
    height:100%; border-radius:2px; background:var(--green);
    transition:width .5s ease, background .35s ease;
  }
  .progress-fill.mid  { background:var(--orange); }
  .progress-fill.full { background:var(--red); }
  .progress-meta { display:flex; justify-content:space-between; margin-top:.45rem; }
  .progress-pct,.progress-limit { font-family:'DM Mono',monospace; font-size:.6rem; color:#bbb; }

  /* ── SPLIT ── */
  .split { display:grid; grid-template-columns:1fr 1fr; gap:.45rem; padding:0 1.25rem .9rem; }
  .split-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:.6rem .7rem; }
  .split-name { font-family:'DM Mono',monospace; font-size:.56rem; letter-spacing:.1em; text-transform:uppercase; color:#ccc; margin-bottom:.28rem; display:flex; align-items:center; gap:.3rem; }
  .split-name svg, .split-name img { flex-shrink:0; width:12px; height:12px; object-fit:contain; }
  .split-time { font-family:'Unbounded',sans-serif; font-weight:700; font-size:1.1rem; color:#fff; letter-spacing:-.03em; }

  /* ── COMMITMENT — always visible ── */
  .commit-row { padding:0 1.25rem .8rem; border-top:1px solid var(--border); padding-top:.8rem; }
  .commit-label { font-family:'DM Mono',monospace; font-size:.56rem; letter-spacing:.1em; text-transform:uppercase; color:#ccc; margin-bottom:.38rem; }
  .commit-input {
    width:100%; background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:.48rem .62rem;
    font-family:'DM Sans',sans-serif; font-size:.75rem; color:#fff;
    outline:none; transition:border-color .15s ease;
  }
  .commit-input::placeholder { color:#666; }
  .commit-input:focus { border-color:rgba(255,59,59,.5); }

  /* ── QUICK LAUNCH ── */
  .launch-row { display:grid; grid-template-columns:1fr 1fr; gap:.45rem; padding:0 1.25rem .85rem; }
  .launch-btn {
    padding:.55rem .5rem; border-radius:9px;
    border:1px solid var(--border); background:var(--surface);
    color:#fff; font-family:'DM Sans',sans-serif; font-size:.73rem; font-weight:500;
    cursor:pointer; display:flex; align-items:center; justify-content:center; gap:.38rem;
    transition:border-color .12s ease, background .12s ease, transform .1s ease;
    will-change:transform;
  }
  .launch-btn:active { transform:scale(.97); }
  .launch-btn svg, .launch-btn img { flex-shrink:0; width:14px; height:14px; object-fit:contain; }

  /* ── FOOTER ── */
  .footer { padding:.75rem 1.25rem .9rem; border-top:1px solid var(--border); }
  .reset-btn {
    width:100%; padding:.65rem;
    background:rgba(255,59,59,.06); border:1px solid rgba(255,59,59,.15);
    border-radius:9px; color:#ff8a8a;
    font-family:'DM Sans',sans-serif; font-size:.78rem; font-weight:500;
    cursor:pointer; display:flex; align-items:center; justify-content:center; gap:.38rem;
    transition:background .12s ease, border-color .12s ease, transform .1s ease;
    will-change:transform;
  }
  .reset-btn:active { transform:scale(.98); background:rgba(255,59,59,.12); border-color:rgba(255,59,59,.3); }

  /* ── DISABLED STATE ── */
  body {
    transition:filter .35s ease, opacity .35s ease;
  }
  body.is-off {
    filter: saturate(0) brightness(0.72);
    opacity: .85;
  }
  body.is-off .tog-wrap {
    filter: saturate(1) brightness(1.1);
    opacity: 1;
  }
  body.is-off .top-strip { background: #2a2a2a; }
  .paused-badge {
    display: none;
    font-family: 'DM Mono', monospace;
    font-size: .52rem;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: #888;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    padding: .15rem .4rem;
    margin-left: .5rem;
    vertical-align: middle;
  }
  body.is-off .paused-badge { display: inline; }
  body.is-off .wordmark span { color: #444; }

  /* ── SETUP PROMPT ── */
  #setupPrompt { display:none; padding:.9rem 1.25rem; background:rgba(255,59,59,.07); border-bottom:1px solid rgba(255,59,59,.18); }
  #setupPrompt div { color:#fff; }

  /* ── SKELETON / LOADING STATE ── */
  .skeleton {
    display:inline-block;
    background:linear-gradient(90deg,#1e1e22 25%,#2a2a30 50%,#1e1e22 75%);
    background-size:200% 100%;
    animation:shimmer 1.2s infinite;
    border-radius:4px;
    color:transparent !important;
  }
  @keyframes shimmer {
    0%   { background-position:200% 0; }
    100% { background-position:-200% 0; }
  }
</style>
</head>
<body>
<div class="top-strip"></div>

<div id="setupPrompt">
  <div style="font-family:'DM Mono',monospace;font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;color:#ff6060;margin-bottom:.35rem;">Setup required</div>
  <div style="font-size:.78rem;color:#ccc;font-weight:300;margin-bottom:.75rem;line-height:1.5;">Complete setup to start tracking. Takes 1 minute.</div>
  <button id="openOnboardingBtn" style="padding:.45rem .95rem;background:#ff3b3b;color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:500;cursor:pointer;">Set my limit →</button>
</div>

<div class="header">
  <div class="wordmark">
    Scroll<span>Cut</span><span class="paused-badge">paused</span>
  </div>
  <div class="tog-wrap">
    <span class="tog-state" id="pwrLbl">ON</span>
    <label class="tog">
      <input type="checkbox" id="mainTog" checked>
      <span class="tog-track"></span>
      <span class="tog-knob"></span>
    </label>
  </div>
</div>

<div class="hero">
  <div class="hero-label">Time lost today</div>
  <div class="hero-time" id="bigTime">0:00</div>
  <div class="hero-unit">hrs : min</div>
  <div class="life-lost" id="lifeLost">Loading…</div>
</div>

<div class="limit-row">
  <div>
    <div class="limit-eyebrow">Daily limit</div>
    <div class="limit-label">Set your max</div>
    <div class="limit-used" id="limitUsed">Used: — min today</div>
  </div>
  <div class="limit-ctrl">
    <button class="lim-btn" id="limMinus">−</button>
    <div>
      <div class="lim-val" id="limVal">30</div>
      <div class="lim-val-unit">min / day</div>
    </div>
    <button class="lim-btn" id="limPlus">+</button>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-meta">
    <span class="progress-pct" id="progressPct">0% of daily limit</span>
    <span class="progress-limit" id="limitLabel">Limit: 30 min</span>
  </div>
</div>

<div class="split">
